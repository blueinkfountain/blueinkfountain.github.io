{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}

<style>
  /* 1. 변수 설정 */
  :root {
    --nav-width: 264px;          /* 평상시 너비 */
    --nav-width-expanded: 450px; /* 마우스 올렸을 때 너비 */
  }

  /* 2. 사이드바 설정 */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0;
    top: 0;
    height: 100vh;
    transition: width 0.3s ease; /* 너비만 부드럽게 확장 */
    overflow-x: hidden;          /* 넘치는 텍스트 숨김 */
    z-index: 100;
    background-color: white;     /* 뒤쪽 본문을 가리기 위해 배경색 지정 */
    border-right: 1px solid #eee;
    
    /* [중요] 글자가 움직이지 않도록 정렬 강제 */
    text-align: left !important;
  }

  /* 마우스 호버 시 사이드바만 확장 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 10px 0 20px rgba(0,0,0,0.1);
  }

  /* 3. 메뉴 리스트 및 글자 고정 설정 */
  /* 메뉴 항목들이 담긴 컨테이너의 너비가 변해도 글자 위치를 고정합니다. */
  .nav-list, .nav-list-item, .nav-list-link {
    width: var(--nav-width-expanded) !important; /* 내부 요소는 미리 확장될 너비만큼 가져감 */
    text-align: left !important;
    display: block !important;
  }

  .nav-list-link, .nav-list-item a {
    /* [핵심] 왼쪽 여백(Padding)을 고정값(px)으로 주어 너비 변화에 영향받지 않게 함 */
    padding-left: 20px !important; 
    
    white-space: nowrap !important;    /* 줄바꿈 방지 */
    overflow: hidden !important;      /* 넘치는 부분 숨김 */
    text-overflow: ellipsis !important; /* 평상시엔 ... 처리 */
    transition: none !important;      /* 글자 위치가 미세하게 움직이는 애니메이션 방지 */
  }

  /* 마우스를 올렸을 때만 생략(...) 해제하고 전체 다 보여주기 */
  .side-bar:hover .nav-list-link,
  .side-bar:hover .nav-list-item a {
    text-overflow: clip !important;
    overflow: visible !important;
  }

  /* 4. 본문(Main) 위치 고정 */
  .main {
    /* 사이드바가 늘어나도 본문 마진은 평상시 너비로 고정 */
    margin-left: var(--nav-width) !important;
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    transition: none !important; /* 본문은 절대 움직이지 않음 */
  }

  @media (min-width: 64rem) {
    .main {
      margin-left: var(--nav-width) !important;
    }
    /* 호버 시에도 본문 마진 고정 */
    .side-bar:hover + .main {
      margin-left: var(--nav-width) !important;
    }
  }

  /* iframe 전체 너비 유지 */
  iframe {
    width: 100% !important;
  }
</style>
