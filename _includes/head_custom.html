<style>
  /* 1. 변수 및 기본 색상 설정 */
  :root {
    --nav-width: 264px;
    --nav-width-expanded: 400px;
    --link-color: #1938c6;           
    --btn-primary-color: #539ded;    
    --sidebar-bg-color: #007dc1;     
    --nav-link-color: #ffffff;       
    --body-bg-color: #ffffff;        
    --main-text-color: #002448;      
    --heading-color: #002448;        
  }

  /* 2. 사이드바 레이아웃 */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0; top: 0; height: 100vh;
    background-color: var(--sidebar-bg-color) !important;
    transition: width 0.3s ease-out !important;
    z-index: 1000;
    overflow-x: hidden !important; 
    display: block !important;
  }

  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 10px 0 25px rgba(0,0,0,0.1);
  }

  /* 3. 전체 열기 버튼 전용 스타일 */
  .custom-menu-control {
    padding: 15px;
    text-align: center;
    width: var(--nav-width) !important; /* 기본 너비에 맞춤 */
  }

  .toggle-all-btn {
    width: 100%;
    padding: 10px;
    background-color: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.5);
    color: white !important;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: background 0.2s;
  }

  .toggle-all-btn:hover {
    background-color: rgba(255, 255, 255, 0.4);
  }

  /* 4. 메뉴 링크 및 배경 설정 */
  .nav-list-link {
    display: block !important;
    color: var(--nav-link-color) !important;
    padding-left: 45px !important;
    background: none !important;
  }

  .nav-list-link:hover {
    background-color: rgba(0, 0, 0, 0.15) !important; 
  }

  /* 활성화된 메뉴 스타일 */
  .nav-list-item.active > .nav-list-link {
    background-color: rgba(0, 0, 0, 0.1) !important;
    font-weight: bold !important;
  }

  /* 하위 메뉴 들여쓰기 */
  .nav-list-item .nav-list-item .nav-list-link { padding-left: 60px !important; }
  .nav-list-item .nav-list-item .nav-list-item .nav-list-link { padding-left: 75px !important; }

  /* 5. 본문 영역 */
  .main {
    margin-left: var(--nav-width) !important;
    width: calc(100% - var(--nav-width)) !important;
  }
</style>

<!-- 6. 버튼을 강제로 사이드바 상단에 배치 -->
<script>
  (function() {
    function injectButton() {
      // 사이드바의 헤더나 제목 부분을 찾습니다.
      const siteTitle = document.querySelector('.site-title');
      
      // 이미 버튼이 있으면 중복 생성 방지
      if (document.getElementById('toggle-all-menus')) return;

      if (siteTitle) {
        const btnContainer = document.createElement('div');
        btnContainer.className = 'custom-menu-control';
        btnContainer.innerHTML = `
          <button id="toggle-all-menus" class="toggle-all-btn">모든 메뉴 펼치기</button>
        `;
        
        // 제목 바로 다음에 삽입
        siteTitle.parentNode.insertBefore(btnContainer, siteTitle.nextSibling);

        const btn = document.getElementById('toggle-all-menus');
        let expanded = false;

        btn.addEventListener('click', function() {
          expanded = !expanded;
          // 모든 메뉴 항목을 찾아서 active 클래스를 토글
          const items = document.querySelectorAll('.nav-list-item');
          items.forEach(item => {
            if (expanded) {
              item.classList.add('active');
            } else {
              // 현재 페이지와 관련된 active는 유지하고 싶다면 조건문을 추가할 수 있으나, 
              // 일단 전체를 닫는 기능으로 구현
              item.classList.remove('active');
            }
          });
          btn.textContent = expanded ? "모든 메뉴 접기" : "모든 메뉴 펼치기";
        });
      }
    }

    // 페이지 로드 시 및 테마의 비동기 로딩을 고려해 반복 확인
    window.addEventListener('load', injectButton);
    setTimeout(injectButton, 500); 
    setTimeout(injectButton, 2000); // 2초 뒤 한 번 더 확인 (안전장치)
  })();
</script>
