<style>
  :root {
    --nav-width: 264px;           /* 평소 너비 */
    --nav-width-expanded: 500px;  /* 마우스 올릴 때 최대 확장 너비 */
  }

  /* 1. 사이드바: 안쪽 내용물을 가리는 '창문' 역할 */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0;
    top: 0;
    height: 100vh;
    transition: width 0.3s ease-out !important;
    z-index: 1000;
    background-color: #fff;
    border-right: 1px solid #eee;
    overflow-x: hidden !important; /* 창문 밖으로 나가는 글자 숨김 */
  }

  /* 호버 시 창문만 넓어짐 (안의 글자는 가만히 있음) */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 10px 0 25px rgba(0,0,0,0.1);
  }

  /* 2. [핵심] 사이드바 내부 컨테이너 박제 */
  /* 사이드바 바로 아래의 실제 메뉴 영역을 확장될 너비로 미리 고정합니다. */
  .side-bar > div, .side-bar nav {
    width: var(--nav-width-expanded) !important;
    min-width: var(--nav-width-expanded) !important;
    position: absolute !important;
    left: 0 !important;
    top: 0;
    transition: none !important; /* 내부 요소 이동 애니메이션 완전 제거 */
  }

  /* 3. 메뉴 항목 레이아웃 정리 */
  .nav-list-item {
    position: relative !important;
    width: 100% !important;
  }

  /* 메뉴 링크(글자) 위치 고정 */
  .nav-list-link {
    display: block !important;
    padding-left: 65px !important; /* 화살표 2개(약 50px) + 여유공간 */
    white-space: nowrap !important;
    text-overflow: ellipsis !important;
    overflow: hidden !important;
    text-align: left !important;
    width: 100% !important;
  }

  .side-bar:hover .nav-list-link {
    text-overflow: clip !important; /* 호버 시 ... 해제 */
  }

  /* 4. 화살표들 위치 고정 (절대 좌표로 박제) */
  .nav-list-expander, .nav-list-expander-all {
    position: absolute !important;
    top: 8px !important; /* 상단 위치 고정 */
    margin: 0 !important;
    padding: 0 !important;
    z-index: 2;
  }

  .nav-list-expander {
    left: 15px !important; /* 단일 화살표 */
  }

  .nav-list-expander-all {
    left: 40px !important; /* 쌍화살표 */
    background: none;
    border: none;
    color: #ccc;
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }
  .nav-list-expander-all:hover { color: #666; }

  /* 5. 본문: 사이드바가 늘어나도 미동도 하지 않음 */
  .main {
    margin-left: var(--nav-width) !important;
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    transition: none !important;
  }

  @media (min-width: 64rem) {
    .main { margin-left: var(--nav-width) !important; }
    /* 사이드바가 확장될 때 본문을 밀지 않고 위로 덮음 */
    .side-bar:hover + .main { margin-left: var(--nav-width) !important; }
  }

  /* iframe 전체 너비 */
  iframe { width: 100% !important; }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
      // 하위 메뉴가 있는 항목에만 쌍화살표 추가
      const parentItems = document.querySelectorAll('.nav-list-item:has(> .nav-list)');
  
      parentItems.forEach(function(item) {
          const singleExpander = item.querySelector('.nav-list-expander');
          if (singleExpander && !item.querySelector('.nav-list-expander-all')) {
              const allExpander = document.createElement('button');
              allExpander.className = 'nav-list-expander-all';
              allExpander.innerHTML = '»'; // 쌍화살표 기호
              singleExpander.after(allExpander);
  
              allExpander.addEventListener('click', function(e) {
                  e.preventDefault();
                  e.stopPropagation();
                  const isOpened = item.classList.contains('active');
                  const subItems = item.querySelectorAll('.nav-list-item');
                  
                  if (!isOpened) {
                      item.classList.add('active');
                      subItems.forEach(el => el.classList.add('active'));
                      allExpander.innerHTML = '«';
                  } else {
                      item.classList.remove('active');
                      subItems.forEach(el => el.classList.remove('active'));
                      allExpander.innerHTML = '»';
                  }
              });
          }
      });
  });
  </script>
