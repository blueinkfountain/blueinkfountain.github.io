<style>
  :root {
    --nav-width: 264px;           /* 기본 너비 */
    --nav-width-expanded: 500px;  /* 마우스 올릴 때 확장될 너비 */
  }

  /* 1. 사이드바: 창문 역할 (여기가 넓어짐) */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0;
    top: 0;
    height: 100vh;
    transition: width 0.3s ease-out !important; /* 부드러운 확장 */
    z-index: 1000;
    background-color: #fff;
    border-right: 1px solid #eee;
    overflow-x: hidden !important; /* 중요: 너비를 벗어나는 내부 내용은 숨김 */
    display: block !important;
  }

  /* 호버 시 사이드바 너비만 확장 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 10px 0 25px rgba(0,0,0,0.1);
  }

  /* 2. [핵심] 내부 컨테이너 고정 */
  /* 사이드바 안의 모든 직계 자식들을 확장될 너비(500px)로 고정합니다. */
  /* 이렇게 하면 사이드바 너비가 변해도 내부 내용은 500px 기준으로 가만히 있습니다. */
  .side-bar > div, 
  .side-bar nav, 
  .side-bar header, 
  .side-bar footer {
    width: var(--nav-width-expanded) !important;
    min-width: var(--nav-width-expanded) !important;
    transition: none !important; /* 내부 요소는 절대 움직이지 않음 */
    text-align: left !important;
  }

  /* 3. 메뉴 아이콘 및 텍스트 고정 */
  .nav-list-item, .nav-list-link {
    width: var(--nav-width-expanded) !important;
    display: block !important;
    white-space: nowrap !important; /* 글자가 아래로 떨어지지 않게 함 */
  }

  /* 화살표(expander) 위치 유지 */
  .nav-list-expander {
    position: absolute !important; /* 화살표를 링크 내부에서 고정 */
    left: 0 !important;
  }

  /* 4. 본문 영역: 사이드바가 확장될 때 절대 움직이지 않음 */
  .main {
    margin-left: var(--nav-width) !important; /* 기본 너비만큼만 유지 */
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    transition: none !important; /* 본문은 흔들림 방지 */
  }

  /* 큰 화면에서 사이드바가 본문을 덮도록 설정 */
  @media (min-width: 64rem) {
    .main {
      margin-left: var(--nav-width) !important;
    }
    /* 사이드바 호버 시 본문 마진을 유지하여 본문이 밀리는 것 방지 */
    .side-bar:hover + .main {
      margin-left: var(--nav-width) !important;
    }
  }

  /* 5. 기존 UI 클릭 깨짐 방지 */
  /* absolute를 최소화하여 기존 테마의 클릭 이벤트 영역을 보존합니다. */
  .nav-list-link {
    padding-left: 60px !important; /* 화살표 공간 확보 */
    cursor: pointer !important;
  }
</style>

{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}
