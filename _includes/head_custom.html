
<!-- 수학 수식(MathJax) 로드 스크립트 -->
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>


<style>
  /* 1. 기본 변수 설정: 너비를 100%로 강제 */
  :root {
    --nav-width: 260px;
    --content-width: 100% !important; 
  }

  /* 2. 본문을 감싸는 모든 컨테이너의 제한 해제 */
  .main {
    max-width: none !important;
    width: auto !important;
  }

  .main-content {
    max-width: none !important; 
    width: 100% !important;
    padding-right: 2rem !important; /* 오른쪽 여백 최소화 */
    padding-left: 2rem !important;
  }

  /* 3. 실제 글이 써지는 내부 래퍼(Wrapper) 제한 해제 */
  .main-content-wrap {
    max-width: none !important;
    width: 100% !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
  }

  /* 4. 사이드바 너비 고정 */
  .side-bar {
    width: var(--nav-width) !important;
  }

  /* 5. 큰 화면(데스크탑)에서 레이아웃 강제 조정 */
  @media (min-width: 64rem) {
    .main {
      margin-left: var(--nav-width) !important;
      display: block !important; /* 플렉스박스 구조 방해 요소 제거 */
    }
    
    /* 상단 헤더 부분도 넓게 확장 */
    .main-header {
        max-width: none !important;
        width: 100% !important;
    }
  }

  /* 6. PDF iframe이 부모 너비를 100% 쓰도록 강제 */
  iframe {
    width: 100% !important;
    display: block;
  }
</style>
