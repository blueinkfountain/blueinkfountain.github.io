{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}
<style>
  :root {
    --nav-width: 264px;           /* 평소 너비 */
    --nav-width-expanded: 450px;  /* 마우스 올릴 때 확장 너비 */
  }

  /* 1. 사이드바: 오른쪽 벽만 움직이는 '커튼' 역할 */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0;
    top: 0;
    height: 100vh;
    transition: width 0.3s ease !important; /* 너비 변화만 부드럽게 */
    z-index: 1000;
    background-color: white;
    border-right: 1px solid #eee;
    
    /* 핵심: 가로 넘침은 무조건 숨김 (이게 있어야 커튼 효과가 남) */
    overflow-x: hidden !important; 
    overflow-y: auto;
  }

  /* 마우스 올릴 때 사이드바 너비만 확장 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 10px 0 20px rgba(0,0,0,0.1);
  }

  /* 2. 본문: 사이드바가 뭘 하든 '절대' 움직이지 않음 */
  .main {
    margin-left: var(--nav-width) !important; /* 호버 전/후 동일하게 고정 */
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    position: relative;
    transition: none !important; /* 본문 관련 애니메이션 완전 차단 */
  }

  /* 3. [가장 중요] 메뉴 글자 위치 박제 */
  .nav-list-item, .nav-list-link, .site-header {
    /* 부모 너비가 변해도 이 안의 내용물은 늘어날 너비만큼 미리 공간을 확보함 */
    /* 이렇게 하면 브라우저가 글자 위치를 재계산하지 않습니다. */
    min-width: var(--nav-width-expanded) !important; 
    
    /* 글자 시작 위치를 px로 강제 고정 */
    text-align: left !important;
    padding-left: 20px !important; 
    margin-left: 0 !important;
    
    display: block !important; /* flex 해제 (글자 움직임의 주범) */
  }

  .nav-list-link {
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important; /* 평소엔 ... */
    
    /* 글자 자체가 움직이는 느낌을 없애기 위해 transition 제거 */
    transition: none !important; 
  }

  /* 마우스 올렸을 때만 말줄임표 제거 */
  .side-bar:hover .nav-list-link {
    text-overflow: clip !important;
    width: auto !important;
  }

  /* 데스크탑에서 본문 위치 재확인 */
  @media (min-width: 64rem) {
    .main {
      margin-left: var(--nav-width) !important;
    }
    .side-bar:hover + .main {
      margin-left: var(--nav-width) !important; /* 사이드바가 본문을 덮음 */
    }
  }

  iframe {
    width: 100% !important;
  }
</style>
