<style>
  :root {
    --nav-width: 264px;           /* 기본 너비 */
    --nav-width-expanded: 450px;  /* 호버 시 확장 너비 */
    --transition-speed: 0.3s;
  }

  /* 1. 사이드바 기본 설정 */
  .side-bar {
    width: var(--nav-width) !important;
    transition: width var(--transition-speed) ease !important;
    overflow-x: hidden !important; /* 확장 전에는 넘치는 글자 숨김 */
    z-index: 100;
    position: fixed !important;
    background-color: #fff;
    border-right: 1px solid #eee;
  }

  /* 2. 사이드바 호버 시: 본문을 밀지 않고 너비만 확장 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 5px 0 15px rgba(0,0,0,0.1);
  }

  /* 3. 본문 영역: 사이드바가 확장되어도 위치 고정 */
  .main {
    margin-left: var(--nav-width) !important; /* 확장 전 너비만큼만 마진 유지 */
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    transition: none !important; /* 본문은 흔들리지 않게 transition 제거 */
  }

  /* 4. 내부 UI 요소 조정 (화살표 및 링크 깨짐 방지) */
  /* 내부 컨테이너의 너비가 좁아져서 텍스트가 줄바꿈되는 것을 방지 */
  .side-bar > div, .nav-list {
    width: var(--nav-width-expanded) !important; /* 내부 요소는 미리 확장된 너비 확보 */
  }

  /* 화살표(expander)와 링크 텍스트 정렬 */
  .nav-list-item {
    white-space: nowrap !important; /* 텍스트 줄바꿈 방지 */
  }

  /* 화살표 아이콘 위치 유지 */
  .nav-list-expander {
    display: flex !important;
    align-items: center;
    justify-content: center;
  }

  /* 링크 텍스트가 화살표와 겹치지 않게 여백 조정 */
  .nav-list-link {
    display: inline-block !important;
    width: auto !important;
    padding-right: 20px !important;
  }

  /* 5. 반응형: 모바일에서는 확장 기능 해제 (선택 사항) */
  @media (max-width: 64rem) {
    .side-bar {
      width: var(--nav-width) !important;
    }
    .side-bar:hover {
      width: var(--nav-width) !important;
      box-shadow: none;
    }
    .main {
      margin-left: 0 !important;
      width: 100% !important;
    }
  }

  /* 6. PDF 및 iframe 너비 최적화 */
  iframe {
    width: 100% !important;
    border: none;
  }
</style>

{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}
