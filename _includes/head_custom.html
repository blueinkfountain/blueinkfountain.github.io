{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}

<style>
  :root {
    --nav-width: 264px;           /* 평소 너비 */
    --nav-width-expanded: 450px;  /* 확장 시 너비 */
  }

  /* 1. 사이드바 - 껍데기 설정 */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0;
    top: 0;
    height: 100vh;
    transition: width 0.3s ease;
    z-index: 1000;
    background-color: #fff;
    border-right: 1px solid #eee;
    
    /* 중요: 내부 요소가 삐져나와도 가로 스크롤을 만들지 않고 숨김 */
    overflow-x: hidden !important; 
    /* 테마의 기본 패딩이 글자를 밀어낼 수 있으므로 0으로 초기화 */
    padding-left: 0 !important;
    padding-right: 0 !important;
  }

  /* 마우스 올릴 때 껍데기만 확장 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 5px 0 15px rgba(0,0,0,0.1);
  }

  /* 2. [핵심] 사이드바 내부의 모든 직접적인 자식 요소들 고정 */
  .side-bar > * {
    /* 부모가 좁아져도 이 박스들은 항상 450px 너비를 유지함 */
    width: var(--nav-width-expanded) !important;
    min-width: var(--nav-width-expanded) !important;
    
    /* 왼쪽 끝에 딱 붙임 */
    margin-left: 0 !important;
    padding-left: 0 !important;
    
    /* 글자가 움직이지 않도록 고정 */
    transition: none !important; 
  }

  /* 3. 메뉴 리스트와 링크의 세부 위치 조정 */
  /* 테마마다 클래스가 다를 수 있지만, Just-the-docs 기준 일반적인 패딩 복구 */
  .nav-list-link, .site-header {
    /* 원래 메뉴가 있어야 할 왼쪽 여백을 여기서 명시적으로 줌 (20px) */
    padding-left: 30px !important; 
    
    white-space: nowrap !important;
    text-overflow: ellipsis !important;
    overflow: hidden !important;
    display: block !important;
    text-align: left !important;
  }

  /* 사이드바 확장 시에만 글자 잘림 해제 */
  .side-bar:hover .nav-list-link {
    text-overflow: clip !important;
  }

  /* 4. 본문 영역 설정 - 절대 밀리지 않음 */
  .main {
    margin-left: var(--nav-width) !important;
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    position: relative;
    transition: none !important;
  }

  @media (min-width: 64rem) {
    .main {
      margin-left: var(--nav-width) !important;
    }
    .side-bar:hover + .main {
      margin-left: var(--nav-width) !important;
    }
  }

  iframe {
    width: 100% !important;
  }
</style>
