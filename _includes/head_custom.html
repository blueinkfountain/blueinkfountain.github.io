{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}

<style>
  /* 1. 기본 변수 설정 */
  :root {
    --nav-width: 264px;          /* 평상시 사이드바 너비 */
    --nav-width-expanded: 450px; /* 마우스 올렸을 때 확장될 너비 (충분히 크게 설정) */
  }

  /* 2. 사이드바 설정 */
  .side-bar {
    width: var(--nav-width) !important;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 부드러운 가속도 효과 */
    overflow-x: hidden;          /* 너비가 좁을 때 글자 숨김 */
    z-index: 100;                /* 본문 위로 올라오도록 높은 우선순위 부여 */
    position: fixed !important;  /* 화면 좌측에 고정 */
    height: 100vh;
    border-right: 1px solid #eee; /* 경계선 (선택사항) */
    background-color: white;     /* 확장 시 뒤의 본문 내용을 가리기 위해 배경색 필수 */
  }

  /* 마우스 올렸을 때만 너비 확장 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 10px 0 15px rgba(0,0,0,0.05); /* 확장될 때 살짝 그림자 효과 (선택사항) */
  }

  /* 3. 메뉴 텍스트 처리 (줄바꿈 방지 및 ... 처리) */
  .nav-list-link, .nav-list-item a, .side-bar a {
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    display: block;
  }

  /* 4. 본문 영역(Main) - 고정 및 정렬 */
  .main {
    /* 사이드바가 fixed이므로, 본문은 평상시 사이드바 너비만큼 왼쪽 여백을 고정해서 가집니다. */
    margin-left: var(--nav-width) !important; 
    max-width: none !important;
    width: calc(100% - var(--nav-width)) !important;
    transition: none !important; /* 본문은 움직이지 않도록 애니메이션 제거 */
  }

  .main-content {
    max-width: none !important; 
    width: 100% !important;
    padding-left: 2rem !important;
    padding-right: 2rem !important;
  }

  /* 5. 데스크탑 레이아웃 고정 */
  @media (min-width: 64rem) {
    .main {
      margin-left: var(--nav-width) !important;
      display: block !important;
    }
    
    /* 사이드바가 확장되어도 본문의 마진은 절대 변하지 않음 */
    .side-bar:hover + .main {
      margin-left: var(--nav-width) !important; 
    }
  }

  /* iframe 설정 유지 */
  iframe {
    width: 100% !important;
    display: block;
  }
</style>
