{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 하위 메뉴가 있는 항목 찾기
    const parentItems = document.querySelectorAll('.nav-list-item:has(> .nav-list)');

    parentItems.forEach(function(item) {
        const singleExpander = item.querySelector('.nav-list-expander');
        
        // 쌍화살표가 이미 생성되었는지 확인 후 삽입
        if (singleExpander && !item.querySelector('.nav-list-expander-all')) {
            const allExpander = document.createElement('button');
            allExpander.className = 'nav-list-expander-all';
            allExpander.innerHTML = '»'; // 쌍화살표 기호
            
            // 핵심: 기존 화살표(singleExpander)의 "앞(왼쪽)"에 삽입
            item.insertBefore(allExpander, singleExpander);

            allExpander.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();

                const subItems = item.querySelectorAll('.nav-list-item');
                const isOpened = item.classList.contains('active');

                if (!isOpened) {
                    item.classList.add('active');
                    subItems.forEach(el => el.classList.add('active'));
                    allExpander.innerHTML = '«';
                } else {
                    item.classList.remove('active');
                    subItems.forEach(el => el.classList.remove('active'));
                    allExpander.innerHTML = '»';
                }
            });
        }
    });
});
</script>

<style>
  :root {
    --nav-width: 264px;           /* 평소 사이드바 너비 */
    --nav-width-expanded: 500px;  /* 확장 시 너비 */
    --arrow-zone: 55px;           /* 화살표 2개가 차지할 고정 영역 */
  }

  /* 1. 사이드바: 껍데기(창문) 설정 */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0;
    top: 0;
    height: 100vh;
    transition: width 0.3s cubic-bezier(0.2, 1, 0.3, 1) !important;
    z-index: 1000;
    background-color: white;
    border-right: 1px solid #eee;
    overflow-x: hidden !important; 
    overflow-y: auto;
  }

  /* 호버 시 사이드바만 확장 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 10px 0 20px rgba(0,0,0,0.08);
  }

  /* 2. 본문: 절대 부동 */
  .main {
    margin-left: var(--nav-width) !important;
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    transition: none !important;
  }

  /* 3. [핵심] 내부 요소 박제 (확장 시 글자/화살표 흔들림 방지) */
  .nav-list-item, .nav-list-link, .site-header {
    /* 내부 박스 너비를 미리 확장될 너비로 고정 */
    min-width: var(--nav-width-expanded) !important; 
    text-align: left !important;
    margin: 0 !important;
    display: block !important;
    position: relative !important;
  }

  .nav-list-link {
    /* 화살표 영역만큼 띄우고 시작 */
    padding-left: var(--arrow-zone) !important; 
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    transition: none !important;
  }

  .side-bar:hover .nav-list-link {
    text-overflow: clip !important;
    width: auto !important;
  }

  /* 4. 화살표들 디자인 및 위치 (기존 스타일 계승) */
  /* 기존 단일 화살표와 새로 만든 쌍화살표 모두에 적용 */
  .nav-list-expander, .nav-list-expander-all {
    position: absolute !important;
    /* 테마의 원래 수직 정렬을 따르도록 설정 */
    top: 50% !important;
    transform: translateY(-50%) !important;
    display: flex !important;
    align-items: center;
    justify-content: center;
    width: 24px !important;
    height: 24px !important;
    padding: 0 !important;
    margin: 0 !important;
    background: none !important;
    border: none !important;
    transition: none !important; /* 확장 시 움직임 제거 */
    z-index: 5;
  }

  /* 쌍화살표 (왼쪽) */
  .nav-list-expander-all {
    left: 8px !important; 
    color: #ccc;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .nav-list-expander-all:hover { color: #666; }

  /* 단일 화살표 (오른쪽) */
  .nav-list-expander {
    left: 32px !important; /* 쌍화살표 너비만큼 옆으로 이동 */
  }

  /* 5. 데스크탑 레이아웃 고정 */
  @media (min-width: 64rem) {
    .main { margin-left: var(--nav-width) !important; }
    .side-bar:hover + .main { margin-left: var(--nav-width) !important; }
  }

  iframe { width: 100% !important; }
</style>
