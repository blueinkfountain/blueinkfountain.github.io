{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}
<style>
  :root {
    --nav-width: 264px;           /* 평소 너비 */
    --nav-width-expanded: 450px;  /* 확장 시 너비 */
  }

  /* 1. 사이드바 - 껍데기 역할만 수행 */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0;
    top: 0;
    height: 100vh;
    transition: width 0.3s ease;
    z-index: 1000;
    background-color: #fff;
    border-right: 1px solid #eee;
    
    /* 핵심: 껍데기 밖으로 나가는 건 무조건 숨김 */
    overflow-x: hidden !important; 
    overflow-y: auto;
  }

  /* 마우스 올릴 때 껍데기만 늘어남 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 5px 0 15px rgba(0,0,0,0.1);
  }

  /* 2. [매우 중요] 사이드바 내부의 실제 컨텐츠 영역 고정 */
  /* 사이드바 바로 아래에 있는 모든 자식 요소의 너비를 아예 처음부터 크게 고정 */
  .side-bar > * {
    width: var(--nav-width-expanded) !important;
    min-width: var(--nav-width-expanded) !important;
    transition: none !important; /* 안쪽 요소는 절대 움직이지 않음 */
  }

  /* 3. 메뉴 링크 글자 설정 */
  .nav-list-link {
    /* 글자가 시작되는 위치를 px로 고정 (너비 변화에 영향 안 받음) */
    padding-left: 16px !important; 
    white-space: nowrap !important;
    text-overflow: ellipsis !important;
    overflow: hidden !important;
    display: block !important;
  }

  /* 호버 시 생략표시 해제 */
  .side-bar:hover .nav-list-link {
    text-overflow: clip !important;
  }

  /* 4. 본문 영역 - 사이드바 확장에 영향받지 않음 */
  .main {
    margin-left: var(--nav-width) !important;
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    position: relative;
  }

  @media (min-width: 64rem) {
    .main {
      margin-left: var(--nav-width) !important;
    }
    /* 사이드바가 확장되어 본문을 덮어도 본문 마진은 고정 */
    .side-bar:hover + .main {
      margin-left: var(--nav-width) !important;
    }
  }

  iframe {
    width: 100% !important;
  }
</style>
