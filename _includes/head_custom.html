{% raw %}
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
{% endraw %}


<style>
  :root {
    --nav-width: 264px;           /* 평소 사이드바 너비 */
    --nav-width-expanded: 450px;  /* 확장 시 사이드바 너비 */
  }

  /* 1. 사이드바 기본 설정 */
  .side-bar {
    width: var(--nav-width) !important;
    position: fixed !important;
    left: 0;
    top: 0;
    height: 100vh;
    transition: width 0.3s ease;  /* 너비만 부드럽게 변화 */
    z-index: 1000;                /* 최상단 레이어 */
    background-color: #fff;       /* 본문을 가리기 위한 배경색 */
    overflow-x: hidden !important; /* 가로 스크롤 방지 및 글자 자르기 */
    border-right: 1px solid #eee;
  }

  /* 2. 마우스 호버 시 사이드바만 확장 */
  .side-bar:hover {
    width: var(--nav-width-expanded) !important;
    box-shadow: 5px 0 15px rgba(0,0,0,0.1); /* 확장될 때 구분선 역할 */
  }

  /* 3. 메뉴 글자 고정 (움직임 방지 및 말줄임) */
  .nav-list-link {
    white-space: nowrap !important;    /* 줄바꿈 절대 금지 */
    text-overflow: ellipsis !important; /* 평소엔 ... 표시 */
    overflow: hidden !important;       /* 넘치는 글자 숨김 */
    
    /* [핵심] 글자 위치 고정: 패딩을 픽셀로 고정하여 너비가 변해도 글자가 안 움직임 */
    padding-left: 16px !important;     
    text-align: left !important;
    display: flex !important;          /* 내부 정렬 유지 */
    align-items: center;
  }

  /* 호버 시 전체 글자 보이기 */
  .side-bar:hover .nav-list-link {
    text-overflow: clip !important;    /* ... 제거 */
  }

  /* 4. 본문 영역 - 절대 움직이지 않도록 설정 */
  .main {
    /* 사이드바가 늘어나든 말든 왼쪽 여백을 항상 동일하게 유지 */
    margin-left: var(--nav-width) !important; 
    width: calc(100% - var(--nav-width)) !important;
    max-width: none !important;
    position: relative;
    transition: none !important;      /* 본문은 애니메이션조차 금지 */
  }

  /* 5. 화면이 넓을 때 본문 위치 강제 고정 */
  @media (min-width: 64rem) {
    .main {
      margin-left: var(--nav-width) !important;
    }
    /* 사이드바에 마우스 올려도 본문 마진은 그대로 유지 */
    .side-bar:hover + .main {
      margin-left: var(--nav-width) !important;
    }
  }

  /* 6. 기존 메뉴 기능(접고 펴기) 방해 금지 */
  /* nav-list나 nav-list-item의 display를 건드리지 않습니다. */

  iframe {
    width: 100% !important;
  }
</style>
